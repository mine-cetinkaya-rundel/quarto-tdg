<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1270 1120"
     role="img"
     aria-labelledby="svg-title svg-desc">
  <title id="svg-title">How Typst template partials assemble a Quarto document</title>
  <desc id="svg-desc">A schematic of the file template.typ, the master partial. It contains an ordered, top-to-bottom stack. The partial files, in order, are: numbering.typ, definitions.typ, typst-template.typ, page.typ, typst-show.typ, then the document body, then notes.typ and biblio.typ. Interleaved between them are three metadata injection slots: header-includes after typst-template.typ, include-before after typst-show.typ, and include-after at the very end. typst-template.typ is annotated as defining the article() function that wraps your content in a title block, table of contents, and base styling. typst-show.typ is annotated as calling article() with a show rule that passes document metadata and pipes everything below it in as the doc argument. A dashed bracket marks include-before, the body, notes, biblio, and include-after as that doc argument; header-includes sits outside it because it runs before the show rule. A separate callout explains the three injection slots, where Pandoc drops Typst supplied by document metadata or extensions.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 20 20" refX="18" refY="10"
            markerWidth="20" markerHeight="20" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M 0 0 L 20 10 L 0 20 z" fill="#444"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 20 20" refX="18" refY="10"
            markerWidth="20" markerHeight="20" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M 0 0 L 20 10 L 0 20 z" fill="#2e5090"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1270" height="1120" fill="#ececec"/>

  <!-- ===== template.typ container ===== -->
  <text x="70" y="108"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'DejaVu Sans Mono', monospace"
        font-size="40" font-weight="bold" fill="#222">template.typ</text>

  <rect x="70" y="160" width="560" height="900" rx="10" fill="#ffffff" stroke="#333" stroke-width="4"/>

  <!-- partial cards + injection slots -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'DejaVu Sans Mono', monospace">

    <!-- numbering.typ -->
    <rect x="110" y="190" width="480" height="72" rx="6" fill="#f4f4f4" stroke="#999" stroke-width="2"/>
    <text x="132" y="236" font-size="30" fill="#222">numbering.typ</text>
    <text x="570" y="236" font-size="26" fill="#777" text-anchor="end"
          font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">number formats</text>

    <!-- definitions.typ -->
    <rect x="110" y="278" width="480" height="72" rx="6" fill="#f4f4f4" stroke="#999" stroke-width="2"/>
    <text x="132" y="324" font-size="30" fill="#222">definitions.typ</text>
    <text x="570" y="324" font-size="26" fill="#777" text-anchor="end"
          font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">helpers</text>

    <!-- typst-template.typ (accent) -->
    <rect x="110" y="366" width="480" height="72" rx="6" fill="#e7edf6" stroke="#2e5090" stroke-width="3"/>
    <text x="132" y="412" font-size="30" fill="#2e5090">typst-template.typ</text>

    <!-- header-includes (injection slot) -->
    <rect x="110" y="454" width="480" height="34" rx="5" fill="#ece9f5" stroke="#6a4c93" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="132" y="478" font-size="22" font-style="italic" fill="#6a4c93">header-includes</text>

    <!-- page.typ -->
    <rect x="110" y="504" width="480" height="72" rx="6" fill="#f4f4f4" stroke="#999" stroke-width="2"/>
    <text x="132" y="550" font-size="30" fill="#222">page.typ</text>
    <text x="570" y="550" font-size="26" fill="#777" text-anchor="end"
          font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">#set page()</text>

    <!-- typst-show.typ (accent) -->
    <rect x="110" y="592" width="480" height="72" rx="6" fill="#e7edf6" stroke="#2e5090" stroke-width="3"/>
    <text x="132" y="638" font-size="30" fill="#2e5090">typst-show.typ</text>

    <!-- include-before (injection slot) -->
    <rect x="110" y="680" width="480" height="34" rx="5" fill="#ece9f5" stroke="#6a4c93" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="132" y="704" font-size="22" font-style="italic" fill="#6a4c93">include-before</text>

    <!-- $body$ (highlight) -->
    <rect x="110" y="730" width="480" height="72" rx="6" fill="#d8ecea" stroke="#1b7f79" stroke-width="3"/>
    <text x="132" y="776" font-size="30" font-weight="bold" fill="#14625d">$body$</text>
    <text x="570" y="776" font-size="26" fill="#2a6f6a" text-anchor="end"
          font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">your .qmd, translated</text>

    <!-- notes.typ -->
    <rect x="110" y="818" width="480" height="72" rx="6" fill="#f4f4f4" stroke="#999" stroke-width="2"/>
    <text x="132" y="864" font-size="30" fill="#222">notes.typ</text>
    <text x="570" y="864" font-size="26" fill="#777" text-anchor="end"
          font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">footnotes</text>

    <!-- biblio.typ -->
    <rect x="110" y="906" width="480" height="72" rx="6" fill="#f4f4f4" stroke="#999" stroke-width="2"/>
    <text x="132" y="952" font-size="30" fill="#222">biblio.typ</text>
    <text x="570" y="952" font-size="26" fill="#777" text-anchor="end"
          font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">bibliography</text>

    <!-- include-after (injection slot) -->
    <rect x="110" y="994" width="480" height="34" rx="5" fill="#ece9f5" stroke="#6a4c93" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="132" y="1018" font-size="22" font-style="italic" fill="#6a4c93">include-after</text>

  </g>

  <!-- ===== article() relationship (define -> call) ===== -->

  <!-- defines box -->
  <line x1="590" y1="402" x2="726" y2="402" stroke="#2e5090" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <rect x="730" y="370" width="500" height="64" rx="8" fill="#e7edf6" stroke="#2e5090" stroke-width="3"/>
  <text x="756" y="413"
        font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="30" font-weight="bold" fill="#2e5090">Defines article()</text>

  <!-- calls box -->
  <line x1="590" y1="628" x2="726" y2="628" stroke="#2e5090" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <rect x="730" y="580" width="500" height="96" rx="8" fill="#e7edf6" stroke="#2e5090" stroke-width="3"/>
  <text font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="30" font-weight="bold" fill="#2e5090"><tspan x="756" y="618">Calls article(doc)</tspan><tspan x="756" y="656">with a #show rule</tspan></text>

  <!-- ===== doc capture: include-before through include-after ===== -->
  <rect x="98" y="672" width="504" height="364" rx="10"
        fill="none" stroke="#1b7f79" stroke-width="3" stroke-dasharray="10 8"/>
  <line x1="602" y1="854" x2="748" y2="854" stroke="#1b7f79" stroke-width="3"/>
  <text x="756" y="863"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'DejaVu Sans Mono', monospace"
        font-size="28" fill="#14625d">doc</text>

</svg>
